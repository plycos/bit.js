<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bit</title>
</head>
<body>
<article style="display: flex; flex-direction: column; align-items: center;">
    <h1 style="width: fit-content; font-size: 3rem; font-family: system-ui, SansSerif;">Web Component Demo</h1>
    <div style="display: flex; gap: 10em;">
        <shadow-counter></shadow-counter>
        <light-counter></light-counter>
    </div>
</article>
<script type="module">
    import {
        defineComponent,
        html,
        css,
        signal,
        computed,
        watch
    } from "./bit.js";

    defineComponent({
        name: 'shadow-counter',
        shadow: true,
        setup: () => {
            const [count, setCount] = signal(0);

            const double = computed(() => count() * 2);

            function increment() {
                setCount(count() + 1);
            }

            watch(double, () => {
                console.log("Double change: ", double())
            });

            return {
                count,
                increment,
                double
            };
        },
        template: ({count, increment, double}) => html`
            <h2>Shadow Counter</h2>
            <button @click=${increment}>Increment</button>
            <div class="count">Count: ${count()}</div>
            <div class="double">Double: ${double()}</div>
        `,
        styles: css`
            :host {
                font-family: system-ui, SansSerif;
                width: fit-content;
                display: flex;
                flex-direction: column;
                gap: 1rem;
            }

            button {
                padding: .5rem 1rem;
                font-size: 1.375rem;
                border-radius: 8px;
                border: none;
                background-color: cornflowerblue;
                color: white;
                cursor: pointer;
                font-weight: 500;
                transition: background-color 0.15s, transform 0.1s;
            }

            button:hover {
                background-color: #4a7fd4;
            }

            button:active {
                transform: scale(0.97);
            }

            .count {
                color: red;
            }

            .double {
                color: blue;
            }
        `
    });

    defineComponent({
        name: 'light-counter',
        setup: () => {
            const [count, setCount] = signal(0);

            const double = computed(() => count() * 2);

            function increment() {
                setCount(count() + 1);
            }

            return {
                count,
                increment,
                double
            };
        },
        template: ({count, increment, double}) => html`
            <div>
                <h2>Light Counter</h2>
                <button @click=${increment}>Increment</button>
                <div class="count">Count: ${count()}</div>
                <div class="double">Double: ${double()}</div>
            </div>
        `,
        styles: css`
            @scope (light-counter) {
                div {
                    font-family: system-ui, SansSerif;
                    width: fit-content;
                    display: flex;
                    flex-direction: column;
                    gap: 1rem;
                }

                button {
                    padding: .5rem 1rem;
                    font-size: 1.375rem;
                    border-radius: 8px;
                    border: none;
                    background-color: cornflowerblue;
                    color: white;
                    cursor: pointer;
                    font-weight: 500;
                    transition: background-color 0.15s, transform 0.1s;
                }

                button:hover {
                    background-color: #4a7fd4;
                }

                button:active {
                    transform: scale(0.97);
                }

                .count {
                    color: red;
                }

                .double {
                    color: blue;
                }
            }
        `
    });
</script>
</body>
</html>
